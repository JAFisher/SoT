<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Social Media App</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container auth-wrapper">
        <div class="auth-box">
            <div class="auth-logo">MessageApp</div>
            <h1>Forgot Password</h1>
            <p class="auth-subtitle">Enter your email and we'll send you a reset link.</p>

            <input type="email" id="email" class="input-field" placeholder="Email Address" required>
            <button id="sendBtn" class="btn btn-primary">Send Reset Link</button>
            <button id="backBtn" class="btn btn-outline" onclick="window.location.href='login.html'">Back to
                Login</button>
        </div>
    </div>


    <script type="module">
        import { MessageApp } from './compiled.js';
        if (typeof window.app === 'undefined') {
            window.app = new MessageApp();
        }
        await window.app.init();

        const sendBtn = document.getElementById('sendBtn');
        const emailInput = document.getElementById('email');

        sendBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            if (email) {
                sendBtn.disabled = true;
                sendBtn.innerText = "Sending...";
                try {
                    await window.app.auth.forgotPassword(email);
                    window.app.showToast("If an account exists, a reset link has been sent.", "success");
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 3000);
                } catch (e) {
                    window.app.showToast(e.message, "error");
                    sendBtn.disabled = false;
                    sendBtn.innerText = "Send Reset Link";
                }
            } else {
                window.app.showToast("Please enter your email.", "error");
            }
        });
    </script>
</body>

</html>
