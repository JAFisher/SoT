<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Social Media App</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container auth-wrapper">
        <div class="auth-box">
            <h1>Reset Password</h1>
            <p class="auth-subtitle">Enter your new password below.</p>

            <input type="password" id="newPassword" class="input-field" placeholder="New Password" required>
            <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm New Password" required>
            <button id="resetBtn" class="btn btn-primary">Reset Password</button>
        </div>
    </div>

    <script type="module">
        import { MessageApp } from './compiled.js';
        if (typeof window.app === 'undefined') {
            window.app = new MessageApp();
        }
        await window.app.init();

        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');

        if (!token || !email) {
            window.app.showToast("Invalid reset link. Redirecting to login...", "error");
            setTimeout(() => window.location.href = 'login.html', 3000);
        } else {
            const confirmBtn = document.getElementById('resetBtn');
            const newPasswordInput = document.getElementById('newPassword');
            const confirmPasswordInput = document.getElementById('confirmPassword');

            confirmBtn.addEventListener('click', async () => {
                const newPass = newPasswordInput.value;
                const confirmPass = confirmPasswordInput.value;

                if (newPass && newPass === confirmPass) {
                    confirmBtn.disabled = true;
                    try {
                        await window.app.auth.resetPassword(email, token, newPass);
                        window.app.showToast("Password reset successful! Redirecting to login...", "success");
                        setTimeout(() => window.location.href = 'login.html', 3000);
                    } catch (e) {
                        window.app.showToast(e.message, "error");
                        confirmBtn.disabled = false;
                    }
                } else if (newPass !== confirmPass) {
                    window.app.showToast("Passwords do not match.", "error");
                } else {
                    window.app.showToast("Please enter a new password.", "error");
                }
            });
        }
    </script>
</body>

</html>
