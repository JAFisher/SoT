<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Network</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container auth-wrapper">
        <div class="auth-box">
            <div class="auth-logo">MessageApp</div>
            <h3>Join today.</h3>

            <input type="text" id="username" class="input-field" placeholder="Username or Email">
            <input type="password" id="password" class="input-field" placeholder="Password">
            <div style="text-align: right; margin-top: -10px; margin-bottom: 20px;">
                <a href="forgot-password.html" style="color: var(--text-secondary); font-size: 0.8rem; text-decoration: none;">Forgot password?</a>
            </div>

            <button id="loginBtn" class="btn btn-primary">Log in</button>
            <button id="registerBtn" class="btn btn-outline" onclick="window.location.href='register.html'">Sign
                up</button>
        </div>
    </div>

    <script type="module">
        import { MessageApp } from './compiled.js';

        window.app = new MessageApp();
        await window.app.init();

        if (window.app.auth.currentUser) {
            window.location.href = 'dashboard.html';
        }

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user && pass) {
                try {
                    await window.app.auth.login(user, pass);
                    window.location.href = 'dashboard.html';
                } catch (e) {
                    window.app.showToast(e.message, "error");
                }
            } else {
                window.app.showToast("Please fill in all fields.", "error");
            }
        });
    </script>
</body>

</html>
