<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Clone Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h2>Home</h2>
            <button id="logoutBtn" class="btn btn-outline" style="width: auto; padding: 6px 12px; font-size: 14px; margin: 0;">Log out</button>
        </div>

        <div id="app-box">
            <div class="post-box">
                <div id="replyLabel" style="display: none; font-size: 13px; color: var(--text-muted); margin-bottom: 8px;"></div>
                <textarea id="tweetContent" placeholder="What is happening?!"></textarea>
                <div class="post-actions">
                    <button id="postBtn" class="btn btn-primary">Post</button>
                </div>
            </div>
            
            <div id="timeline"></div>
        </div>

    </div>

    <script type="module">
        import { TwitterApp } from './compiled.js';

        window.app = new TwitterApp();
        await window.app.init();

        if (!window.app.auth.currentUser) {
            window.location.href = 'login.html';
        } else {
            await window.app.renderTimeline('timeline');
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            window.app.auth.logout();
            window.location.href = 'login.html';
        });

        document.getElementById('postBtn').addEventListener('click', async () => {
            const box = document.getElementById('tweetContent');
            const content = box.value;
            const repliedToId = box.dataset.repliedToId || '';
            
            if (content.trim() && window.app.auth.currentUser) {
                await window.app.postNewTweet(window.app.auth.currentUser.username, content, repliedToId, '');
                await window.app.renderTimeline('timeline');
                box.value = '';
                box.dataset.repliedToId = '';
                const label = document.getElementById('replyLabel');
                if (label) label.style.display = 'none';
            }
        });
    </script>
</body>

</html>
