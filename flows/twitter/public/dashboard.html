<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Clone Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="profile-section">
                <img id="sidebar-avatar" src="https://abs.twimg.com/sticky/default_profile_images/default_profile_normal.png" class="profile-avatar-sm">
                <div class="profile-info">
                    <span id="header-name" style="font-weight: bold;"></span>
                    <div class="user-stats">
                        <span><b id="header-following-count">0</b> Following</span>
                        <span><b id="header-followers-count">0</b> Followers</span>
                    </div>
                    <button id="updateAvatarBtn" class="btn-text">Update Avatar</button>
                    <input type="file" id="avatarInput" accept="image/png, image/jpeg" style="display: none;">
                </div>
            </div>
            <button id="logoutBtn" class="btn btn-outline"
                style="width: auto; padding: 6px 12px; font-size: 14px; margin: 0;">Log out</button>
        </div>

        <div id="app-box">
            <div class="post-box">
                <div id="replyLabel"
                    style="display: none; font-size: 13px; color: var(--text-muted); margin-bottom: 8px;"></div>
                <textarea id="tweetContent" placeholder="What is happening?!"></textarea>
                <div id="imagePreview" style="display: none; margin-bottom: 10px; position: relative;">
                    <img id="previewImg" src="" style="max-width: 100%; border-radius: var(--radius-md);">
                    <button id="removeImgBtn" class="btn" style="position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; border-radius: 50%; padding: 0; background: rgba(0,0,0,0.6); color: white;">✕</button>
                </div>
                <div class="post-actions">
                    <input type="file" id="imgInput" accept="image/png, image/jpeg" style="display: none;">
                    <button id="addImgBtn" class="btn btn-outline" style="width: auto; padding: 6px 12px; margin-right: 10px;">🖼️ Image</button>
                    <button id="postBtn" class="btn btn-primary">Post</button>
                </div>
            </div>
            <h3 class="timeline-header">Timeline</h3>
            <div id="timeline"></div>
            <div class="load-more-container">
                <button id="loadMoreBtn" class="btn btn-outline" style="display: none;" onclick="window.app.loadMore('timeline')">Load More</button>
            </div>
        </div>

    </div>

    <script type="module">
        import { TwitterApp } from './compiled.js';

        window.app = new TwitterApp();
        await window.app.init();

        if (!window.app.auth.currentUser) {
            window.location.href = 'login.html';
        } else {
            document.getElementById('header-name').innerText = window.app.auth.currentUser.name || window.app.auth.currentUser.username;
            document.getElementById('header-following-count').innerText = window.app.auth.currentUser.followingCount || 0;
            document.getElementById('header-followers-count').innerText = window.app.auth.currentUser.followerCount || 0;
            const user = window.app.auth.getCurrentUser();
            if (user && user.avatarUrl) {
                document.getElementById('sidebar-avatar').src = user.avatarUrl;
            }
            await window.app.renderTimeline('timeline');
        }

        document.getElementById('logoutBtn').addEventListener('click', () => {
            window.app.auth.logout();
            window.location.href = 'login.html';
        });

        let selectedImageBase64 = null;

        document.getElementById('addImgBtn').addEventListener('click', () => {
            document.getElementById('imgInput').click();
        });

        document.getElementById('updateAvatarBtn').addEventListener('click', () => {
            document.getElementById('avatarInput').click();
        });

        document.getElementById('avatarInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (re) => {
                    const base64 = re.target.result;
                    try {
                        const uploadRes = await window.app.feed.uploadImage(base64);
                        await window.app.updateAvatar(uploadRes.url);
                    } catch (err) {
                        window.app.showToast(err.message, 'error');
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('imgInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (re) => {
                    selectedImageBase64 = re.target.result;
                    document.getElementById('previewImg').src = selectedImageBase64;
                    document.getElementById('imagePreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('removeImgBtn').addEventListener('click', () => {
            selectedImageBase64 = null;
            document.getElementById('imgInput').value = '';
            document.getElementById('imagePreview').style.display = 'none';
        });

        document.getElementById('postBtn').addEventListener('click', async () => {
            const box = document.getElementById('tweetContent');
            const content = box.value;
            const repliedToId = box.dataset.repliedToId || '';

            if ((content.trim() || selectedImageBase64) && window.app.auth.currentUser) {
                let imageUrl = '';
                if (selectedImageBase64) {
                    try {
                        const uploadRes = await window.app.feed.uploadImage(selectedImageBase64);
                        imageUrl = uploadRes.url;
                    } catch (e) {
                        window.app.showToast(e.message, 'error');
                        return;
                    }
                }

                await window.app.postNewTweet(window.app.auth.currentUser.username, content, repliedToId, '', imageUrl);
                await window.app.renderTimeline('timeline');
                
                // Reset
                box.value = '';
                box.dataset.repliedToId = '';
                selectedImageBase64 = null;
                document.getElementById('imgInput').value = '';
                document.getElementById('imagePreview').style.display = 'none';
                const label = document.getElementById('replyLabel');
                if (label) label.style.display = 'none';
            }
        });
    </script>
</body>

</html>
