<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Network - Connections</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="layout-wrapper">
        <div class="container">
            <div class="header">
                <button class="btn btn-outline back-btn" id="social-back-btn" 
                    style="width: auto; padding: 6px 12px;">← Back</button>
                <div style="margin-left: 16px;">
                    <h2 id="social-user-name" style="margin: 0; font-size: 19px;">Loading...</h2>
                    <div id="social-user-handle" style="color: var(--text-secondary); font-size: 13px;">@...</div>
                </div>
                <div style="flex-grow: 1; text-align: right;">
                    <button id="themeToggleBtn" class="btn btn-outline" onclick="window.app.toggleTheme()" style="padding: 6px; border-radius: 50%; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px;">
                        <svg id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px; display: block;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                        <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px; display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    </button>
                </div>
            </div>

            <div id="app-box">
                <div class="social-tabs">
                    <div id="tab-followers" class="social-tab" onclick="switchTab('followers')">Followers</div>
                    <div id="tab-following" class="social-tab" onclick="switchTab('following')">Following</div>
                </div>

                <div id="social-list"></div>
            </div>
        </div>

        <div class="right-sidebar">
            <div id="trending-container" class="trending-box"></div>
        </div>
    </div>

    <script type="module">
        import { TwitterApp } from './compiled.js';

        window.app = new TwitterApp();
        await window.app.init();

        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('username');
        let currentTab = urlParams.get('tab') || 'followers';

        if (!username) {
            window.location.href = 'dashboard.html';
        } else {
            try {
                const user = await window.app.getUserInfo(username);
                document.getElementById('social-user-name').innerText = user.name || user.username;
                document.getElementById('social-user-handle').innerText = '@' + user.username;
                document.getElementById('social-back-btn').onclick = () => {
                   window.location.href = 'profile.html?username=' + username;
                };

                window.switchTab = async (tab) => {
                    currentTab = tab;
                    document.querySelectorAll('.social-tab').forEach(t => t.classList.remove('active'));
                    document.getElementById('tab-' + tab).classList.add('active');
                    
                    // Update URL without reload
                    const newUrl = new URL(window.location.href);
                    newUrl.searchParams.set('tab', tab);
                    window.history.replaceState({}, '', newUrl);

                    await window.app.renderSocialList('social-list', username, tab);
                };

                // Initial render
                await switchTab(currentTab);
                await window.app.renderTrending('trending-container');
            } catch (err) {
                console.error(err);
                window.app.showToast("User not found", 'error');
                setTimeout(() => window.location.href = 'dashboard.html', 2000);
            }
        }
    </script>
</body>

</html>
