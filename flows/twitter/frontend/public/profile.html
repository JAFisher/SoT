<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Network</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="layout-wrapper">
        <div class="container">
            <div class="header">
                <button class="btn btn-outline back-btn" onclick="window.location.href='dashboard.html'"
                    style="width: auto; padding: 6px 12px;">← Back</button>
                <h2 id="profile-title">Profile</h2>
                <div style="flex-grow: 1; text-align: right;">
                    <button id="themeToggleBtn" class="btn btn-outline" onclick="window.app.toggleTheme()" style="padding: 6px; border-radius: 50%; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px;">
                        <svg id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px; display: block;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                        <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px; display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    </button>
                </div>
            </div>

            <div id="app-box">
                <div class="profile-header">
                    <div id="profile-banner" class="profile-banner-placeholder" style="position: relative;">
                        <button id="updateBannerBtn" class="btn btn-outline" style="display: none;">Update
                            Banner</button>
                        <input type="file" id="bannerInput" accept="image/png, image/jpeg" style="display: none;">
                    </div>
                    <img id="profile-avatar" src="http://localhost:8080/images/userprofiledefault.png"
                        alt="Profile Avatar" class="profile-avatar-large">
                    <div class="profile-info-profile">
                        <h2 id="profile-name" style="margin-bottom: 4px;"></h2>
                        <div id="profile-username" style="color: var(--text-secondary); margin-bottom: 12px;"></div>
                        <div class="profile-stats-large">
                            <a id="profile-following-link" href="#"
                                style="text-decoration: none; color: inherit;"><span><b id="profile-following">0</b>
                                    Following</span></a>
                            <a id="profile-followers-link" href="#"
                                style="text-decoration: none; color: inherit;"><span><b id="profile-followers">0</b>
                                    Followers</span></a>
                        </div>
                    </div>
                </div>

                <h3 class="timeline-header">Messages</h3>
                <div id="user-timeline"></div>
                <div class="load-more-container">
                    <button id="loadMoreBtn" class="btn btn-outline" style="display: none;">Load More</button>
                </div>
            </div>
        </div>

        <div class="right-sidebar">
            <div id="trending-container" class="trending-box"></div>
        </div>
    </div>

    <script type="module">
        import { TwitterApp } from './compiled.js';

        window.app = new TwitterApp();
        await window.app.init();

        const urlParams = new URLSearchParams(window.location.search);
        const username = urlParams.get('username');

        if (!username) {
            window.location.href = 'dashboard.html';
        } else {
            try {
                const user = await window.app.getUserInfo(username);
                document.getElementById('profile-name').innerText = user.name || user.username;
                document.getElementById('profile-username').innerText = '@' + user.username;
                document.getElementById('profile-followers').innerText = user.follower_count || 0;
                document.getElementById('profile-following').innerText = user.following_count || 0;
                if (user.avatar_url) {
                    document.getElementById('profile-avatar').src = user.avatar_url;
                }
                document.getElementById('profile-title').innerText = user.name || user.username;
                document.getElementById('profile-following-link').href = 'social.html?username=' + username + '&tab=following';
                document.getElementById('profile-followers-link').href = 'social.html?username=' + username + '&tab=followers';

                if (user.banner_url) {
                    const bannerElem = document.getElementById('profile-banner');
                    bannerElem.style.backgroundImage = "url('" + user.banner_url + "')";
                    bannerElem.classList.remove('profile-banner-placeholder');
                }

                // Show update button if viewing own profile
                const currentUser = window.app.auth.getCurrentUser();
                if (currentUser && currentUser.username === username) {
                    const upBtn = document.getElementById('updateBannerBtn');
                    upBtn.style.display = 'block';
                    upBtn.onclick = () => document.getElementById('bannerInput').click();

                    document.getElementById('bannerInput').onchange = async (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = async (re) => {
                                try {
                                    const uploadRes = await window.app.feed.uploadImage(re.target.result);
                                    await window.app.updateBanner(uploadRes.url);
                                } catch (err) {
                                    window.app.showToast(err.message, 'error');
                                }
                            };
                            reader.readAsDataURL(file);
                        }
                    };
                }

                await window.app.renderUserTimeline('user-timeline', username, false);
                await window.app.renderTrending('trending-container');
            } catch (err) {
                window.app.showToast("User not found", 'error');
                setTimeout(() => window.location.href = 'dashboard.html', 2000);
            }
        }
    </script>
</body>

</html>
