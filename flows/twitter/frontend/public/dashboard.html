<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="A Twitter-style social network engine built using SoT (Single Oriented Transformation) syntax.">
    <title>Social Network</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="layout-wrapper">
        <div class="container">
            <div class="header">
                <div class="profile-section">
                    <a id="profile-avatar-link" href="#"><img id="sidebar-avatar"
                            src="http://localhost:8080/images/userprofiledefault.png" alt="User Avatar"
                            class="profile-avatar-sm"></a>
                    <div class="profile-info">
                        <a id="profile-name-link" href="#" style="text-decoration: none; color: inherit;"><span
                                id="header-name" style="font-weight: bold;"></span></a>
                        <div class="user-stats">
                            <a id="header-following-link" href="#"
                                style="text-decoration: none; color: inherit;"><span><b
                                        id="header-following-count">0</b> Following</span></a>
                            <a id="header-followers-link" href="#"
                                style="text-decoration: none; color: inherit;"><span><b
                                        id="header-followers-count">0</b> Followers</span></a>
                        </div>
                        <button id="updateAvatarBtn" class="btn-text">Update Avatar</button>
                        <input type="file" id="avatarInput" accept="image/png, image/jpeg" style="display: none;">
                    </div>
                </div>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <button id="themeToggleBtn" class="btn btn-outline" onclick="window.app.toggleTheme()" style="padding: 6px; border-radius: 50%; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px;">
                        <svg id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px; display: block;"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                        <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 20px; height: 20px; display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
                    </button>
                    <button id="adminBtn" class="btn btn-outline" style="display: none;">Admin</button>
                    <button id="notificationsBtn" class="btn btn-outline" style="position: relative;">Notifications
                        <span id="notifications-badge" class="badge" style="display: none;">0</span>
                    </button>
                    <button id="logoutBtn" class="btn btn-outline">Log out</button>
                </div>
            </div>

            <div id="app-box">
                <div class="post-box">
                    <div id="replyLabel"
                        style="display: none; font-size: 13px; color: var(--text-muted); margin-bottom: 8px;"></div>
                    <textarea id="tweetContent" placeholder="What is happening?!" maxlength="300"></textarea>
                    <div id="imagePreview" style="display: none; margin-bottom: 10px; position: relative;">
                        <img id="previewImg" src="" alt="Image Preview"
                            style="max-width: 100%; border-radius: var(--radius-md);">
                        <button id="removeImgBtn" class="btn"
                            style="position: absolute; top: 10px; right: 10px; width: 30px; height: 30px; border-radius: 50%; padding: 0; background: rgba(0,0,0,0.6); color: white; display: flex; align-items: center; justify-content: center;">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                        </button>
                    </div>
                    <div class="post-actions">
                        <input type="file" id="imgInput" accept="image/png, image/jpeg" style="display: none;">
                        <div id="charCount" class="char-counter">0 / 300</div>
                        <button id="addImgBtn" class="add-image-btn btn btn-outline" style="display: inline-flex; align-items: center;"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg> Image</button>
                        <button id="addPaintBtn" class="add-image-btn btn btn-outline" style="display: inline-flex; align-items: center;"><svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px;"><path d="M12 19l7-7 3 3-7 7-3-3z"></path><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"></path><path d="M2 2l5 5"></path><path d="M11 11l1 1"></path></svg> Draw</button>
                        <button id="postBtn" class="btn btn-primary">Post</button>
                    </div>
                </div>

                <!-- Paint Modal -->
                <div id="paintModal" class="modal" style="display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center;">
                    <div class="modal-content" style="background: var(--bg-primary); padding: 20px; border-radius: var(--radius-lg); width: 90%; max-width: 540px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                            <h3 style="margin: 0;">Draw something</h3>
                            <button id="closePaintBtn" class="btn-text">✕</button>
                        </div>
                        <canvas id="paintCanvas" width="500" height="400" style="border: 2px solid var(--border-color); background: white; cursor: crosshair; width: 100%; touch-action: none; border-radius: var(--radius-md);"></canvas>
                        <div style="margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;">
                            <input type="color" id="paintColor" value="#000000" style="width: 40px; height: 40px; border: none; padding: 0; border-radius: 50%; overflow: hidden; cursor: pointer;">
                            <input type="range" id="paintWidth" min="1" max="20" value="2" style="flex-grow: 1;">
                            <button id="clearPaintBtn" class="btn btn-outline">Clear</button>
                            <button id="savePaintBtn" class="btn btn-primary">Attach</button>
                        </div>
                    </div>
                </div>
                <div id="timeline-container" role="main">
                    <h3 class="timeline-header">Messages</h3>
                    <div id="timeline"></div>
                </div>

                <div id="notifications-container" style="display: none;">
                    <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                        <button id="backToHomeBtn" class="btn btn-outline">Back</button>
                    </div>
                    <div id="notifications-list"></div>
                </div>

                <div class="load-more-container">
                    <button id="loadMoreBtn" class="btn btn-outline" style="display: none;">Load More</button>
                </div>

                <div id="search-container" style="display: none;">
                    <div id="backFromSearchContainer">
                        <button id="backFromSearchBtn" class="btn btn-outline">Back</button>
                    </div>
                    <h3 class="timeline-header">Search Results</h3>
                    <div id="search-list"></div>
                    <div class="load-more-container">
                        <button id="searchLoadMoreBtn" class="btn btn-outline" style="display: none;">Load More</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="right-sidebar">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search..." class="search-input">
                <button id="searchBtn" class="btn btn-outline"
                    style="padding: 6px 12px; height: 100%; box-sizing: border-box; display: flex; align-items: center; justify-content: center;">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </button>
            </div>
            <div id="trending-container" style="display:none" class="trending-box"></div>
        </div>
    </div>

    <script type="module">
        import { TwitterApp } from './compiled.js';

        window.app = new TwitterApp();
        await window.app.init();

        if (!window.app.auth.currentUser) {
            window.location.href = 'login.html';
        } else {
            const currentUsername = window.app.auth.currentUser.username;

            // Initial UI sync with cached data
            document.getElementById('header-name').innerText = window.app.auth.currentUser.name || currentUsername;
            document.getElementById('header-following-count').innerText = window.app.auth.currentUser.followingCount || window.app.auth.currentUser.following_count || 0;
            document.getElementById('header-followers-count').innerText = window.app.auth.currentUser.followerCount || window.app.auth.currentUser.follower_count || 0;

            document.getElementById('profile-avatar-link').href = 'profile.html?username=' + currentUsername;
            document.getElementById('profile-name-link').href = 'profile.html?username=' + currentUsername;
            document.getElementById('header-following-link').href = 'social.html?username=' + currentUsername + '&tab=following';
            document.getElementById('header-followers-link').href = 'social.html?username=' + currentUsername + '&tab=followers';

            // Asynchronously fetch fresh data
            window.app.getUserInfo(currentUsername).then(user => {
                window.app.auth.updateCurrentUser(user);
                document.getElementById('header-name').innerText = user.name || currentUsername;
                document.getElementById('header-following-count').innerText = user.following_count || 0;
                document.getElementById('header-followers-count').innerText = user.follower_count || 0;
                if (user.avatar_url) {
                    document.getElementById('sidebar-avatar').src = user.avatar_url;
                }
            }).catch(e => console.error("Failed to refresh user stats:", e));

            document.getElementById('profile-avatar-link').href = 'profile.html?username=' + currentUsername;
            document.getElementById('profile-name-link').href = 'profile.html?username=' + currentUsername;

            const user = window.app.auth.getCurrentUser();
            if (user && user.avatarUrl) {
                document.getElementById('sidebar-avatar').src = user.avatarUrl;
            }
            await window.app.renderTimeline('timeline');
            await window.app.renderTrending('trending-container');

            const urlParams = new URLSearchParams(window.location.search);
            const tag = urlParams.get('hashtag');
            if (tag) {
                await window.app.showHashtagTimeline(tag);
            }

            // Periodic notification check
            window.app.checkNotifications();

            // Admin button check
            if (window.app.auth.currentUser && window.app.auth.currentUser.isAdmin) {
                document.getElementById('adminBtn').style.display = 'block';
            }
        }

        document.getElementById('adminBtn').addEventListener('click', () => {
            window.location.href = 'admin.html';
        });

        document.getElementById('notificationsBtn').addEventListener('click', (e) => {
            e.preventDefault();
            document.getElementById('timeline-container').style.display = 'none';
            document.getElementById('notifications-container').style.display = 'block';
            window.app.renderNotifications('notifications-list');
        });

        document.getElementById('backToHomeBtn').addEventListener('click', () => {
            document.getElementById('notifications-container').style.display = 'none';
            document.getElementById('timeline-container').style.display = 'block';
            // Re-bind load more button for timeline
            window.app.loadTimeline('timeline', false);
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            window.app.auth.logout();
            window.location.href = 'login.html';
        });

        document.getElementById('searchBtn').addEventListener('click', () => {
            const query = document.getElementById('searchInput').value.trim();
            if (query) {
                document.getElementById('timeline-container').style.display = 'none';
                document.getElementById('notifications-container').style.display = 'none';
                document.getElementsByClassName('load-more-container')[0].style.display = 'none';
                document.getElementById('search-container').style.display = 'block';
                window.app.performSearch(query, false);
            }
        });

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('searchBtn').click();
            }
        });

        document.getElementById('backFromSearchBtn').addEventListener('click', () => {
            document.getElementById('search-container').style.display = 'none';
            document.getElementById('searchInput').value = '';
            document.getElementById('timeline-container').style.display = 'block';
            window.app.loadTimeline('timeline', false);
        });

        let selectedImageBase64 = null;

        document.getElementById('addImgBtn').addEventListener('click', () => {
            document.getElementById('imgInput').click();
        });

        document.getElementById('addPaintBtn').addEventListener('click', () => {
            document.getElementById('paintModal').style.display = 'flex';
            window.app.paint.clear();
        });

        document.getElementById('closePaintBtn').addEventListener('click', () => {
            document.getElementById('paintModal').style.display = 'none';
        });

        document.getElementById('clearPaintBtn').addEventListener('click', () => {
            window.app.paint.clear();
        });

        document.getElementById('savePaintBtn').addEventListener('click', () => {
            selectedImageBase64 = window.app.paint.getImage();
            document.getElementById('previewImg').src = selectedImageBase64;
            document.getElementById('imagePreview').style.display = 'block';
            document.getElementById('paintModal').style.display = 'none';
        });

        document.getElementById('paintColor').addEventListener('input', (e) => {
            window.app.paint.setColor(e.target.value);
        });

        document.getElementById('paintWidth').addEventListener('input', (e) => {
            window.app.paint.setLineWidth(parseInt(e.target.value));
        });

        document.getElementById('updateAvatarBtn').addEventListener('click', () => {
            document.getElementById('avatarInput').click();
        });

        document.getElementById('avatarInput').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = async (re) => {
                    const base64 = re.target.result;
                    try {
                        const uploadRes = await window.app.feed.uploadImage(base64);
                        await window.app.updateAvatar(uploadRes.url);
                    } catch (err) {
                        window.app.showToast(err.message, 'error');
                    }
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('imgInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (re) => {
                    selectedImageBase64 = re.target.result;
                    document.getElementById('previewImg').src = selectedImageBase64;
                    document.getElementById('imagePreview').style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        document.getElementById('removeImgBtn').addEventListener('click', () => {
            selectedImageBase64 = null;
            document.getElementById('imgInput').value = '';
            document.getElementById('imagePreview').style.display = 'none';
        });

        // --- Post Button & Character Limit Logic ---
        const box = document.getElementById('tweetContent');
        const charCountElem = document.getElementById('charCount');

        box.addEventListener('input', () => {
            const len = box.value.length;
            charCountElem.innerText = len + " / 300";
            if (len >= 300) {
                charCountElem.classList.add('limit-reached');
            } else {
                charCountElem.classList.remove('limit-reached');
            }
        });

        document.getElementById('postBtn').addEventListener('click', async () => {
            const content = box.value;
            const repliedToId = box.dataset.repliedToId || '';

            if ((content.trim() || selectedImageBase64) && window.app.auth.currentUser) {
                let imageUrl = '';
                if (selectedImageBase64) {
                    try {
                        const uploadRes = await window.app.feed.uploadImage(selectedImageBase64);
                        imageUrl = uploadRes.url;
                    } catch (e) {
                        window.app.showToast(e.message, 'error');
                        return;
                    }
                }

                await window.app.postNewTweet(window.app.auth.currentUser.username, content, repliedToId, '', imageUrl);
                await window.app.renderTimeline('timeline');

                // Reset
                box.value = '';
                charCountElem.innerText = "0 / 300";
                charCountElem.classList.remove('limit-reached');
                box.dataset.repliedToId = '';
                selectedImageBase64 = null;
                document.getElementById('imgInput').value = '';
                document.getElementById('imagePreview').style.display = 'none';
                const label = document.getElementById('replyLabel');
                if (label) label.style.display = 'none';
            }
        });
    </script>
</body>

</html>
