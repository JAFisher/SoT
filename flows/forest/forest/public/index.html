<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoT - Procedural Forest</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: white;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        #overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #4caf50, #81c784);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            margin: 5px 0 0;
            font-size: 14px;
            opacity: 0.7;
        }

        .stats {
            margin-top: 15px;
            font-size: 12px;
            display: flex;
            gap: 15px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-weight: bold;
            font-size: 18px;
            color: #81c784;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            opacity: 0.5;
        }
    </style>

</head>

<body>
    <div id="canvas-container"></div>
    <div id="overlay">
        <h1>Procedural Forest</h1>
        <p>300 Unique Species Generated via SoT Engine</p>
        <div class="stats">
            <div class="stat-item">
                <span class="stat-value">300</span>
                <span class="stat-label">Tree Classes</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">∞</span>
                <span class="stat-label">Variations</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { ForestFactory, ForestView } from './compiled.js';

        async function start() {
            console.log("🌲 Initializing Forest via Factory...");
            const factory = new ForestFactory();
            const view = new ForestView(factory.createForest());
            await view.init();
            view.animate();

            console.log("🌳 Forest Simulation Started!");

        }

        start();
    </script>
</body>

</html>
